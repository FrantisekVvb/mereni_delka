name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ověření statických souborů
        run: |
          test -f index.html
          test -f ruler.svg
          echo "Statické soubory v pořádku."
