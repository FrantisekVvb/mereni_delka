<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Měření délek</title>
  <style>
    * {
      box-sizing: border-box;
    }

    /*
     * Fenomen Sans: OTF z repa vividbooks/periodickatabulka (složka font/).
     * Obnovení: curl -fsSL -o fonts/FenomenSans/FenomenSans-Book.otf \
     *   https://raw.githubusercontent.com/vividbooks/periodickatabulka/main/font/Fenomen%20Sans%20Book.otf
     * (analogicky Semi Bold → FenomenSans-SemiBold.otf, Bold → FenomenSans-Bold.otf)
     */
    @font-face {
      font-family: "Fenomen Sans";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src:
        local("Fenomen Sans Book"),
        local("FenomenSans-Book"),
        url("fonts/FenomenSans/FenomenSans-Book.otf") format("opentype");
    }

    @font-face {
      font-family: "Fenomen Sans";
      font-style: normal;
      font-weight: 500;
      font-display: swap;
      src:
        local("Fenomen Sans Medium"),
        local("FenomenSans-Medium"),
        url("fonts/FenomenSans/FenomenSans-Book.otf") format("opentype");
    }

    @font-face {
      font-family: "Fenomen Sans";
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src:
        local("Fenomen Sans Semi Bold"),
        local("Fenomen Sans SemiBold"),
        local("FenomenSans-SemiBold"),
        url("fonts/FenomenSans/FenomenSans-SemiBold.otf") format("opentype");
    }

    @font-face {
      font-family: "Fenomen Sans";
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src:
        local("Fenomen Sans Bold"),
        local("FenomenSans-Bold"),
        url("fonts/FenomenSans/FenomenSans-Bold.otf") format("opentype");
    }

    :root {
      /* Stejná šířka pro fixní měřící sloupec i odsazení práční (aby se nepřekrývaly). */
      --meas-panel-w: min(340px, max(260px, 34vw), 100vw);
      --font-app: "Fenomen Sans", system-ui, sans-serif;
    }

    html {
      height: 100%;
      width: 100%;
      font-family: var(--font-app);
    }

    html,
    body {
      height: 100%;
      width: 100%;
      margin: 0;
      background: #ffffff;
      color-scheme: light;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--font-app);
    }

    button,
    input,
    textarea,
    select {
      font-family: var(--font-app);
    }

    .app-root {
      position: relative;
      box-sizing: border-box;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Fixní měřící sloupec vlevo — vykresluje se jako samostatný pás přes výšku okna. */
    .left-panel {
      position: fixed;
      inset: 0 auto 0 0;
      box-sizing: border-box;
      z-index: 100;
      width: var(--meas-panel-w);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      border-right: 2px solid rgb(0 0 0 / 0.25);
      box-shadow: 6px 0 24px rgb(0 0 0 / 0.06);
      background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
    }

    .zoom-bar-left {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid rgb(0 0 0 / 0.12);
      background: rgba(255, 255, 255, 0.85);
      font-size: 13px;
    }

    .zoom-bar-left .zoom-heading-left {
      margin: 0;
      width: 100%;
      font-weight: 600;
      font-size: 13px;
      color: #1a1a1a;
    }

    .zoom-bar-left button {
      min-height: 36px;
      min-width: 36px;
      padding: 0 10px;
      border-radius: 6px;
      border: 1px solid rgb(0 0 0 / 0.28);
      background: #ffffff;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      line-height: 1;
      color: #000000;
    }

    .zoom-bar-left button.zoom-button-text {
      min-width: 3.75rem;
      font-size: 12px;
    }

    .zoom-bar-left button:hover {
      background: rgb(0 0 0 / 0.06);
    }

    .zoom-bar-left button:active {
      background: rgb(0 0 0 / 0.1);
    }

    .zoom-bar-left button:focus-visible {
      outline: 2px solid rgb(0 0 0 / 0.45);
      outline-offset: 2px;
    }

    #zoomSlider {
      flex: 1 1 120px;
      min-width: 100px;
      max-width: 100%;
      accent-color: #000000;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border-width: 0;
    }

    .guide-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 10px 18px;
    }

    .guide-pan-toolbar {
      width: 100%;
      max-width: 299px;
      margin: 0 auto 10px;
      padding-top: 4px;
    }

    .canvas-pan-toggle {
      box-sizing: border-box;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid rgb(0 0 0 / 0.28);
      background: #ffffff;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      color: #1a1a1a;
      -webkit-tap-highlight-color: transparent;
    }

    .canvas-pan-toggle:hover {
      background: rgb(0 0 0 / 0.06);
    }

    .canvas-pan-toggle:active {
      background: rgb(0 0 0 / 0.1);
    }

    .canvas-pan-toggle:focus-visible {
      outline: 2px solid rgb(0 0 0 / 0.45);
      outline-offset: 2px;
    }

    .canvas-pan-toggle.is-pressed {
      border-color: rgb(0 98 71 / 0.55);
      background: linear-gradient(180deg, #e8f5ef 0%, #d8efe4 100%);
      color: rgb(0 58 42);
    }

    .canvas-pan-toggle.is-pressed:hover {
      border-color: rgb(0 108 78 / 0.72);
    }

    .canvas-pan-toggle__icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: block;
    }

    .guide-card {
      position: relative;
      width: 100%;
      max-width: 299px;
      margin: 10px auto 0;
      aspect-ratio: 299 / 442;
      overflow: visible;
      user-select: none;
      -webkit-user-drag: none;
    }

    .guide-card img.measure-guide-svg,
    .guide-card svg.measure-guide-svg {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .guide-input-layer {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .meas-slot {
      position: absolute;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 4px;
      pointer-events: auto;
      border-radius: 5.5px;
      border: 1px dashed transparent;
      overflow: visible;
      transition:
        border-color 0.15s ease,
        box-shadow 0.15s ease;
    }

    .meas-tolerance-hint {
      position: absolute;
      left: 50%;
      top: calc(100% + 3px);
      transform: translateX(-50%);
      margin: 0;
      padding: 0;
      white-space: nowrap;
      font: inherit;
      font-size: clamp(9px, 2.6vw, 10px);
      font-weight: 600;
      line-height: 1.2;
      color: rgb(0 72 52);
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transition:
        opacity 0.15s ease,
        visibility 0.15s ease;
    }

    .meas-slot.meas-slot--correct .meas-tolerance-hint {
      visibility: visible;
      opacity: 1;
    }

    .meas-slot input {
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      border: none;
      background: rgb(255 255 255 / 0.7);
      text-align: center;
      font: inherit;
      font-size: 13px;
      outline: none;
      border-radius: 4px;
      padding: 2px;
    }

    .meas-slot input::placeholder {
      color: rgb(165 173 169);
      font-size: 11px;
    }

    .meas-slot.meas-slot--neutral {
      border-color: transparent;
    }

    .meas-slot.meas-slot--correct {
      border-color: rgb(0 108 76 / 0.92);
      box-shadow:
        inset 0 0 0 1px rgb(0 128 93 / 0.42),
        0 0 0 1px rgb(0 152 110 / 0.4),
        0 2px 8px rgb(0 112 80 / 0.16);
      background-color: rgb(88 214 170 / 0.42);
    }

    .meas-slot.meas-slot--wrong {
      border-color: rgb(196 61 73 / 0.55);
      box-shadow:
        inset 0 0 0 1px rgb(240 59 80 / 0.15),
        0 0 0 1px rgb(240 59 80 / 0.12);
      background-color: rgb(253 237 239 / 0.45);
    }

    .meas-slot.meas-slot--verify {
      padding: 1px;
      align-items: stretch;
      background: transparent;
    }

    .meas-verify-btn {
      box-sizing: border-box;
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      margin: 0;
      padding: 2px clamp(8px, 2.5vw, 12px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: clamp(11px, 3vw, 12px);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: none;
      color: #141816;
      line-height: 1.05;
      border: 1px solid rgb(0 0 0 / 0.14);
      border-radius: 6px;
      background: linear-gradient(180deg, #f8f9f8 0%, #ecefec 52%, #e5e7e6 100%);
      box-shadow:
        0 1px 2px rgb(0 0 0 / 0.06),
        0 0 0 1px rgb(255 255 255 / 0.55) inset;
      transition:
        border-color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease,
        color 0.15s ease,
        transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .meas-verify-btn:hover {
      border-color: rgb(0 98 71 / 0.32);
      background: linear-gradient(180deg, #fbfcfb 0%, #f3f6f4 52%, #ebefec 100%);
      box-shadow:
        0 2px 5px rgb(0 56 41 / 0.08),
        0 0 0 1px rgb(255 255 255 / 0.7) inset;
    }

    .meas-verify-btn:active {
      transform: scale(0.985);
      border-color: rgb(0 0 0 / 0.22);
      background: linear-gradient(180deg, #ebedea 0%, #e5e8e6 100%);
      box-shadow:
        0 1px 2px rgb(0 0 0 / 0.05),
        inset 0 2px 4px rgb(0 0 0 / 0.06);
    }

    .meas-verify-btn:focus-visible {
      outline: 2px solid rgb(0 98 71 / 0.5);
      outline-offset: 1px;
    }

    .meas-slot--correct.meas-slot--verify .meas-verify-btn {
      border-color: rgb(0 98 71 / 0.78);
      color: rgb(0 58 42);
      background: linear-gradient(180deg, #def7ed 0%, #b5ead4 100%);
    }

    .meas-slot--correct.meas-slot--verify .meas-verify-btn:hover {
      border-color: rgb(0 108 78 / 0.92);
    }

    .meas-slot--wrong.meas-slot--verify .meas-verify-btn {
      border-color: rgb(196 61 73 / 0.45);
      color: rgb(112 38 46);
      background: linear-gradient(180deg, #fdf8f9 0%, #f8ecee 100%);
    }

    .meas-slot--wrong.meas-slot--verify .meas-verify-btn:hover {
      border-color: rgb(196 61 73 / 0.62);
    }

    .workspace {
      box-sizing: border-box;
      position: relative;
      z-index: 1;
      margin-left: var(--meas-panel-w);
      width: calc(100% - var(--meas-panel-w));
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .board-stage {
      flex: 1;
      position: relative;
      min-height: 0;
      overflow: hidden;
      touch-action: none;
    }

    #board {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      touch-action: none;
      overflow: hidden;
      outline: none;
      border: none;
      box-shadow: none;
    }

    .board-stage:focus-visible {
      outline: none;
    }

    #boardZoomLayer {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transform: translate(var(--board-pan-x, 0px), var(--board-pan-y, 0px)) scale(var(--board-zoom, 1));
      transform-origin: var(--zoom-origin-x, 50%) var(--zoom-origin-y, 50%);
      will-change: transform;
    }

    .board-pan-catch {
      position: absolute;
      inset: 0;
      z-index: 60;
      cursor: grab;
      touch-action: none;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .board-pan-catch[hidden] {
      display: none !important;
    }

    .board-pan-catch.is-dragging-pan {
      cursor: grabbing;
    }

    .cucumbers-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      outline: none;
      filter: drop-shadow(0 2px 4px rgb(0 128 91 / 0.12));
    }
    .cucumbers-shell:focus-visible {
      outline: none;
      box-shadow: none;
    }
    .cucumbers-outer {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      transform: translate(var(--cucumbers-x, 0px), var(--cucumbers-y, 0px));
      will-change: transform;
    }
    .cucumbers-shell.is-dragging-cucumbers .cucumbers-outer {
      cursor: grabbing;
    }
    .cucumbers-outer img {
      display: block;
      width: 351px;
      max-width: min(351px, 42vw);
      height: auto;
      pointer-events: auto;
      cursor: inherit;
    }

    /*
      Kanonické souřadnice: spodní levý roh rámu pravítka (bx, by) na nástěnce.
      Vnější `translate()` je (bx, by−h); vnitřní `rotate()` má transform-origin ve středu pravítka.
    */
    .ruler-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      outline: none;
    }
    .ruler-shell:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .ruler-outer {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      transform: translate(var(--otl-x, 0px), var(--otl-y, 0px));
      will-change: transform;
      opacity: 0.5;
    }
    .ruler-shell.is-dragging-move .ruler-outer {
      cursor: grabbing;
    }

    .ruler-visual {
      position: relative;
      display: inline-block;
      vertical-align: top;
      touch-action: none;
      transform: rotate(var(--ruler-angle, 0deg));
      transform-origin: center center;
      will-change: transform;
    }
    .ruler-visual svg.ruler-graphic {
      display: block;
      width: 520px;
      max-width: 100%;
      height: auto;
      pointer-events: auto;
      -webkit-user-drag: none;
      cursor: grab;
    }

    /* Neviditelný úchop přes šipku – bez vizuálního zvýraznění */
    .hit-rotate {
      position: absolute;
      right: clamp(-16px, -2.5vmin, -6px);
      bottom: clamp(-12px, -2vmin, -4px);
      width: clamp(88px, 20vmin, 118px);
      height: clamp(70px, 16vmin, 96px);
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      touch-action: none;
      cursor: grab;
      z-index: 2;
      -webkit-tap-highlight-color: transparent;
      pointer-events: auto;
      box-sizing: border-box;
      appearance: none;
    }
    .hit-rotate:active,
    .ruler-shell.is-dragging-corner .hit-rotate {
      cursor: grabbing;
    }
    .hit-rotate:focus,
    .hit-rotate:focus-visible {
      outline: none;
      box-shadow: none;
    }

    .pencil-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      outline: none;
      filter: drop-shadow(0 2px 4px rgb(0 0 0 / 0.1));
    }
    .pencil-shell:focus-visible {
      outline: none;
      box-shadow: none;
    }
    .pencil-outer {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      transform: translate(var(--pencil-x, 0px), var(--pencil-y, 0px));
      will-change: transform;
    }
    .pencil-shell.is-dragging-pencil .pencil-outer {
      cursor: grabbing;
    }
    .pencil-outer img {
      display: block;
      width: 218px;
      max-width: min(218px, 42vw);
      height: auto;
      pointer-events: auto;
      cursor: inherit;
    }

    .creditcard-shell {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      outline: none;
      filter: drop-shadow(0 2px 5px rgb(0 17 97 / 0.18));
    }
    .creditcard-shell:focus-visible {
      outline: none;
      box-shadow: none;
    }
    .creditcard-outer {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: auto;
      cursor: grab;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: none;
      transform: translate(var(--creditcard-x, 0px), var(--creditcard-y, 0px));
      will-change: transform;
    }
    .creditcard-shell.is-dragging-creditcard .creditcard-outer {
      cursor: grabbing;
    }
    .creditcard-outer img {
      display: block;
      width: 505px;
      max-width: min(505px, 92vw);
      height: auto;
      pointer-events: auto;
      cursor: inherit;
    }

    /* Úzké okno: klasický blokový sloupec návodů nahoře, práceň zabere zbytek. */
    @media (max-width: 760px) {
      .app-root {
        display: flex;
        flex-direction: column;
      }

      .left-panel {
        position: relative;
        inset: auto;
        width: 100%;
        max-width: 100%;
        max-height: min(52vh, 460px);
        overflow-y: auto;
        overflow-x: hidden;
        flex-shrink: 0;
        box-shadow: none;
        border-right: none;
        border-bottom: 2px solid rgb(0 0 0 / 0.25);
        z-index: auto;
      }

      .workspace {
        flex: 1 1 auto;
        margin-left: 0;
        width: 100%;
        min-height: 0;
      }
    }
  </style>
</head>
<body>
<div class="app-root">
  <aside class="left-panel">
    <div class="zoom-bar-left" role="toolbar" aria-label="Přiblížení pracovní plochy">
      <p class="zoom-heading-left" id="zoomBarHeadingLeft">Přiblížení plátna</p>
      <span id="zoomSliderLabelLeft" class="sr-only">Měřítko pracovní plochy v procentech</span>
      <button type="button" id="zoomOutBtn" aria-label="Oddálit plátno">−</button>
      <input
        type="range"
        id="zoomSlider"
        min="75"
        max="200"
        step="5"
        value="100"
        aria-labelledby="zoomBarHeadingLeft zoomSliderLabelLeft"
        aria-valuemin="75"
        aria-valuemax="200"
        aria-valuenow="100"
        aria-valuetext="100 procent"
      />
      <button type="button" id="zoomInBtn" aria-label="Přiblížit plátno">+</button>
      <button type="button" id="zoomResetBtn" class="zoom-button-text" aria-label="Obnovit měřítko na 100 procent">
        100&nbsp;%
      </button>
    </div>

    <div class="guide-scroll">
      <div class="guide-pan-toolbar">
        <button
          type="button"
          id="canvasPanToggleBtn"
          class="canvas-pan-toggle"
          aria-pressed="false"
          aria-label="Pohybovat s plátnem — zapíná režim přetahování celého plátna"
        >
          <svg
            class="canvas-pan-toggle__icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M18 11V6a2 2 0 00-2-2 2 2 0 00-2 2M14 10V4a2 2 0 00-2-2 2 2 0 00-2 2v2M10 10.5V6a2 2 0 00-2-2 2 2 0 00-2 2v8a8 8 0 008 8h2c2.8 0 4.5-.86 5.99-2.34l1.41-1.41a2 2 0 00-2.83-2.82L15 15"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span>Pohybovat s plátnem</span>
        </button>
      </div>
      <div class="guide-card">
        <svg class="measure-guide-svg" width="299" height="442" viewBox="0 0 299 442" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Návod k měření" draggable="false" focusable="false">
        <rect x="155.5" y="81.5" width="143" height="33" rx="5.5" fill="#C9C9C9" stroke="black"/>
        <rect x="155.5" y="299.5" width="143" height="33" rx="5.5" fill="#C9C9C9" stroke="black"/>
        <rect x="155.5" y="408.5" width="143" height="33" rx="5.5" fill="#C9C9C9" stroke="black"/>
        <rect x="0.5" y="81.5" width="143" height="33" rx="5.5" stroke="black"/>
        <rect x="0.5" y="190.5" width="143" height="33" rx="5.5" stroke="black"/>

          <div class="meas-slot meas-slot--neutral" data-meas-pair-id="creditShort" style="left: calc(100% * 0.5 / 299); width: calc(100% * 143 / 299); top: calc(100% * 299.5 / 442); height: calc(100% * 33 / 442)">
            <input type="text" inputmode="decimal" maxlength="12" autocomplete="off" data-measure-key="creditShort" aria-label="Kratší rozměr kreditní karty — cm (levý box)" />
            <span class="meas-tolerance-hint" aria-hidden="true">±0,5&nbsp;mm</span>
          </div>
          <div class="meas-slot meas-slot--neutral meas-slot--verify" data-meas-pair-id="creditShort" style="left: calc(100% * 155.5 / 299); width: calc(100% * 143 / 299); top: calc(100% * 299.5 / 442); height: calc(100% * 33 / 442)">
            <button type="button" class="meas-verify-btn" aria-label="Ověřit řádek — kratší strana karty">
              Ověřit
            </button>
          </div>
          <div class="meas-slot meas-slot--neutral" data-meas-pair-id="creditLong" style="left: calc(100% * 0.5 / 299); width: calc(100% * 143 / 299); top: calc(100% * 408.5 / 442); height: calc(100% * 33 / 442)">
            <input type="text" inputmode="decimal" maxlength="12" autocomplete="off" data-measure-key="creditLong" aria-label="Delší rozměr kreditní karty — cm (levý box)" />
            <span class="meas-tolerance-hint" aria-hidden="true">±0,5&nbsp;mm</span>
          </div>
          <div class="meas-slot meas-slot--neutral meas-slot--verify" data-meas-pair-id="creditLong" style="left: calc(100% * 155.5 / 299); width: calc(100% * 143 / 299); top: calc(100% * 408.5 / 442); height: calc(100% * 33 / 442)">
            <button type="button" class="meas-verify-btn" aria-label="Ověřit řádek — delší strana karty">
              Ověřit
            </button>
          </div>
        </div>
      </div>
    </div>
  </aside>

  <div class="workspace">
    <div class="board-stage" id="boardStage">
      <main id="board" aria-label="Pracovní plocha">
        <div id="boardZoomLayer">
          <div
            class="cucumbers-shell"
            id="cucumbersShell"
            tabindex="0"
            aria-label="Sklenička s okurkami — na návodě se měří výška skleničky (referenčně 9,57 cm). Přetahujte ji po plátně. Po zaostření klávesou Tab je posouvejte šipkami. Vizualizace je pod tužkou a kartou."
          >
            <div class="cucumbers-outer" id="cucumbersOuter">
              <img src="cucumbers.svg" width="351" height="478" alt="Okurky" draggable="false" />
            </div>
          </div>

          <div
      class="ruler-shell"
      id="rulerShell"
      tabindex="0"
      aria-label="Pravítko: je vždy nad ostatními předměty a je zobrazeno napůl průhledně. Táhněte tělem. Zelenou šipku v pravém dolním rohu potáhněte pro otáčení kolem levého dolního rohu. Tužku, platební kartu nebo skleničku s okurkami přetahujte tam, kde pravítko nepokrývá plochu (sklenička leží nejníže). Bez modifikátorů pohyb šipkami, s klávesou Alt plus šipkami vpravo nebo doleva se pravítko jemně natáčí kolem levého dolního rohu."
          >
            <div class="ruler-outer" id="rulerOuter">
              <div class="ruler-visual" id="rulerVisual">
                <img src="ruler.svg" width="520" height="68" alt="" draggable="false" />

                <button
                  class="hit-rotate"
                  tabindex="-1"
                  type="button"
                  aria-label="Otočit kolem levého spodního rohu pravítka (uchop zelené šipky vpravo dole)."
                ></button>
              </div>
            </div>
          </div>

          <div
      class="pencil-shell"
      id="pencilShell"
      tabindex="0"
      aria-label="Tužka. Přetáhněte ji po ploše. Po zaostření klávesou Tab ji posouvejte šipkami."
          >
            <div class="pencil-outer" id="pencilOuter">
              <img src="pencil.svg" width="218" height="217" alt="Tužka" draggable="false" />
            </div>
          </div>

          <div
      class="creditcard-shell"
      id="creditCardShell"
      tabindex="0"
      aria-label="Platební karta. Přetáhněte ji po ploše. Po zaostření klávesou Tab ji posouvejte šipkami."
          >
            <div class="creditcard-outer" id="creditCardOuter">
              <img src="creditcard.svg" width="505" height="436" alt="Platební karta" draggable="false" />
            </div>
          </div>
        </div>
        <div
          id="boardPanCatch"
          class="board-pan-catch"
          hidden
          aria-hidden="true"
        ></div>
      </main>
    </div>
  </div>
</div>

<script>
    (function () {
      var board = document.getElementById("board");
      var shell = document.getElementById("rulerShell");
      var rulerOuter = document.getElementById("rulerOuter");

      /** @type {HTMLElement} */
      var hitRotate = rulerOuter.querySelector(".hit-rotate");
      /** Grafika pravítka — v HTML může být SVG nebo obrázek. @type {SVGSVGElement | HTMLImageElement | null} */
      var img =
        rulerOuter.querySelector("svg.ruler-graphic") ||
        rulerOuter.querySelector("img");

      var pencilShell = document.getElementById("pencilShell");
      var pencilOuter = document.getElementById("pencilOuter");
      /** @type {HTMLImageElement} */
      var pencilImg = pencilOuter.querySelector("img");

      var creditCardShell = document.getElementById("creditCardShell");
      var creditCardOuter = document.getElementById("creditCardOuter");
      /** @type {HTMLImageElement} */
      var creditCardImg = creditCardOuter.querySelector("img");

      var cucumbersShell = document.getElementById("cucumbersShell");
      var cucumbersOuter = document.getElementById("cucumbersOuter");
      /** @type {HTMLImageElement} */
      var cucumbersImg = cucumbersOuter.querySelector("img");

      var boardStage = document.getElementById("boardStage");
      /** @type {HTMLElement | null} */
      var boardZoomLayer = document.getElementById("boardZoomLayer");
      /** @type {HTMLInputElement} */
      var zoomSlider = /** @type {HTMLInputElement} */ (document.getElementById("zoomSlider"));
      var zoomOutBtn = document.getElementById("zoomOutBtn");
      var zoomInBtn = document.getElementById("zoomInBtn");
      var zoomResetBtn = document.getElementById("zoomResetBtn");
      var canvasPanToggleBtn = /** @type {HTMLButtonElement} */ (document.getElementById("canvasPanToggleBtn"));
      var boardPanCatch = /** @type {HTMLElement} */ (document.getElementById("boardPanCatch"));

      /** Aktuální měřítko plátna (1 = 100 %). @type {number} */
      var boardZoom = 1;
      /** Střed měřítka zoomu v px na nástěnce — střed viditelného plátna (ne střed pravítka), aby se při zoomu obsah „netáhl“ za pravítkem. */
      var zoomFocalOx = 0;
      var zoomFocalOy = 0;
      /** Posun celého měřeného plátna v px obrazovky (režim „pohybovat s plátnem“). */
      var boardPanX = 0;
      var boardPanY = 0;
      /** @type {{ ox: number, oy: number, cx: number, cy: number } | null} */
      var boardPanDragBase = null;

      function applyBoardZoomCss() {
        if (boardZoomLayer) {
          boardZoomLayer.style.setProperty("--board-zoom", String(boardZoom));
          boardZoomLayer.style.setProperty("--board-pan-x", boardPanX + "px");
          boardZoomLayer.style.setProperty("--board-pan-y", boardPanY + "px");
        }
      }

      function updateZoomLabel() {
        var v = Math.round(Number(zoomSlider.value));
        zoomSlider.setAttribute("aria-valuenow", String(v));
        zoomSlider.setAttribute("aria-valuetext", v + " procent");
      }

      function syncAfterZoomChange() {
        refreshZoomFocalAroundRuler();
        applyLayout();
        applyPencilLayout();
        applyCreditLayout();
        applyCucumbersLayout();
        applyBoardZoomCss();
        updateZoomLabel();
      }

      function bumpZoomStep(dirSign) {
        var lo = Number(zoomSlider.min);
        var hi = Number(zoomSlider.max);
        var step = Number(zoomSlider.step) || 5;
        var cur = Number(zoomSlider.value);
        var next = cur + dirSign * step;
        if (next < lo) next = lo;
        if (next > hi) next = hi;
        zoomSlider.value = String(next);
        boardZoom = next / 100;
        syncAfterZoomChange();
      }

      function setBoardZoomPct(pctWhole) {
        var lo = Number(zoomSlider.min);
        var hi = Number(zoomSlider.max);
        var p = pctWhole;
        if (p < lo) p = lo;
        if (p > hi) p = hi;
        zoomSlider.value = String(p);
        boardZoom = p / 100;
        syncAfterZoomChange();
      }

      zoomSlider.addEventListener("input", function () {
        boardZoom = Number(zoomSlider.value) / 100;
        syncAfterZoomChange();
      });

      zoomOutBtn.addEventListener("click", function () {
        bumpZoomStep(-1);
      });
      zoomInBtn.addEventListener("click", function () {
        bumpZoomStep(1);
      });
      zoomResetBtn.addEventListener("click", function () {
        setBoardZoomPct(100);
      });

      boardStage.addEventListener(
        "wheel",
        function (ev) {
          ev.preventDefault();
          bumpZoomStep(ev.deltaY > 0 ? -1 : 1);
        },
        { passive: false }
      );

      canvasPanToggleBtn.addEventListener("click", function () {
        var on = canvasPanToggleBtn.getAttribute("aria-pressed") !== "true";
        canvasPanToggleBtn.setAttribute("aria-pressed", on ? "true" : "false");
        canvasPanToggleBtn.classList.toggle("is-pressed", on);
        if (on) {
          boardPanCatch.removeAttribute("hidden");
          boardPanCatch.setAttribute("aria-hidden", "false");
        } else {
          boardPanCatch.setAttribute("hidden", "");
          boardPanCatch.setAttribute("aria-hidden", "true");
          boardPanCatch.classList.remove("is-dragging-pan");
          if (mode === "board-pan") {
            var capOff = gestureCaptureElement();
            if (capOff && activePointerId != null) safeReleasePointerCapture(capOff, activePointerId);
            resetGesture();
          }
        }
      });

      /** @type {Record<string, number>} */
      var REF_CM = { pencil: 4.32, jar: 9.57, creditShort: 5.4, creditLong: 8.56 };
      var MEAS_TOL_CM = 0.05;

      function parseCmInput(raw) {
        var s = String(raw || "")
          .trim()
          .replace(/\s+/g, "")
          .replace(/,/g, ".");
        if (!s) return NaN;
        var v = Number(s);
        return Number.isFinite(v) ? v : NaN;
      }

      function measJudgementForInput(inp) {
        var key = inp.getAttribute("data-measure-key");
        if (!key) return "empty";
        if (!inp.value.trim()) return "empty";
        var v = parseCmInput(inp.value);
        if (!Number.isFinite(v)) return "invalid";
        var ref = REF_CM[key];
        if (Math.abs(v - ref) <= MEAS_TOL_CM + 1e-10) return "ok";
        return "wrong";
      }

      function applyMeasClasses(inp, clsName) {
        var slot = /** @type {HTMLElement | null} */ (inp.closest(".meas-slot"));
        if (!slot) return;
        var pairId = slot.getAttribute("data-meas-pair-id");

        /** @type {HTMLElement} */
        function applyOne(/** @type {HTMLElement} */ el) {
          el.classList.remove("meas-slot--neutral", "meas-slot--correct", "meas-slot--wrong");
          el.classList.add(clsName);
        }

        if (!pairId) {
          applyOne(slot);
          return;
        }
        var paired = document.querySelectorAll(".meas-slot[data-meas-pair-id=\"" + pairId + "\"]");
        var pj;
        for (pj = 0; pj < paired.length; pj++) {
          applyOne(/** @type {HTMLElement} */ (paired[pj]));
        }
      }

      function verifyAllMeasures() {
        var inputs = document.querySelectorAll(".meas-slot input[data-measure-key]");
        var inputsArray = inputs;
        var i;
        var total = inputsArray.length;
        for (i = 0; i < total; i++) {
          /** @type {HTMLInputElement} */
          var inp = /** @type {HTMLInputElement} */ (inputsArray[i]);
          var st = measJudgementForInput(inp);
          if (st === "empty") {
            applyMeasClasses(inp, "meas-slot--neutral");
            continue;
          }
          if (st === "invalid") {
            applyMeasClasses(inp, "meas-slot--wrong");
          } else if (st === "ok") {
            applyMeasClasses(inp, "meas-slot--correct");
          } else {
            applyMeasClasses(inp, "meas-slot--wrong");
          }
        }
      }

      /** Ověří jeden řádek (jeden vstup napravo od tlačítka Ověřit má stejný data-meas-pair-id). */
      function verifyMeasuresForPairId(pairId) {
        /** @type {HTMLInputElement | null} */
        var inpElem = /** @type {HTMLInputElement | null} */ (
          document.querySelector(".meas-slot[data-meas-pair-id=\"" + pairId + "\"] input[data-measure-key]")
        );
        if (!inpElem) return;
        var st = measJudgementForInput(inpElem);
        if (st === "empty") {
          applyMeasClasses(inpElem, "meas-slot--neutral");
        } else if (st === "invalid") {
          applyMeasClasses(inpElem, "meas-slot--wrong");
        } else if (st === "ok") {
          applyMeasClasses(inpElem, "meas-slot--correct");
        } else {
          applyMeasClasses(inpElem, "meas-slot--wrong");
        }
      }

      var measureInputsAll = document.querySelectorAll(".meas-slot input[data-measure-key]");
      for (var mi = 0; mi < measureInputsAll.length; mi++) {
        (function (inpLike) {
          /** @type {HTMLInputElement} */
          var inpElem = /** @type {HTMLInputElement} */ (inpLike);
          inpElem.addEventListener("blur", verifyAllMeasures);
          inpElem.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
              e.preventDefault();
              verifyAllMeasures();
            }
          });
        })(measureInputsAll[mi]);
      }

      var verifyBtnAll = document.querySelectorAll(".meas-verify-btn");
      var vbi;
      for (vbi = 0; vbi < verifyBtnAll.length; vbi++) {
        /** @type {HTMLButtonElement} */
        var bBtn = /** @type {HTMLButtonElement} */ (verifyBtnAll[vbi]);
        bBtn.addEventListener("click", function (ev) {
          /** @type {HTMLElement | null} */
          var pSlot = /** @type {HTMLElement | null} */ ((/** @type {HTMLElement} */ (ev.currentTarget)).closest(".meas-slot"));
          var pid = pSlot ? pSlot.getAttribute("data-meas-pair-id") : null;
          if (pid) verifyMeasuresForPairId(pid);
        });
      }

      function focusNoScroll(el) {
        try {
          el.focus({ preventScroll: true });
        } catch (_e) {
          el.focus();
        }
      }

      function preventActivationSpace(ev) {
        if (ev.key === " " || ev.code === "Space") {
          ev.preventDefault();
        }
      }

      hitRotate.addEventListener("keydown", preventActivationSpace);

      /** @typedef {'idle'|'move'|'rotate'|'pencil-move'|'creditcard-move'|'cucumbers-move'|'board-pan'} Mode */
      /** @type {Mode} */
      var mode = "idle";
      /** @type {number|null} */
      var activePointerId = null;
      /** @type {HTMLElement|null} */
      var rotateGripEl = null;

      var bx = 0;
      var by = 0;
      var thetaDeg = 0;

      /** @type {{ bx: number, by: number, fx: number, fy: number } | null} */
      var moveBase = null;
      /** @type {number|null} */
      var lastAngleAgainstPivotRad = null;

      /** @type {{ px: number, py: number, fx: number, fy: number } | null} */
      var pencilDragBase = null;
      var pencilPx = 0;
      var pencilPy = 0;

      /** @type {{ px: number, py: number, fx: number, fy: number } | null} */
      var creditDragBase = null;
      var creditPx = 0;
      var creditPy = 0;

      /** @type {{ px: number, py: number, fx: number, fy: number } | null} */
      var cucumbersDragBase = null;
      var cucumbersPx = 0;
      var cucumbersPy = 0;

      var PAD = 10;
      var MIN_R = 38;

      function rulerSize() {
        return {
          w: img != null && img.offsetWidth ? img.offsetWidth : 520,
          h: img != null && img.offsetHeight ? img.offsetHeight : 68,
        };
      }

      function rotCwVec(dx, dy, deg) {
        var r = (deg * Math.PI) / 180;
        var c = Math.cos(r);
        var s = Math.sin(r);
        return [dx * c + dy * s, -dx * s + dy * c];
      }

      function unwrapDeltaRad(delta) {
        var twoPi = Math.PI * 2;
        while (delta > Math.PI) delta -= twoPi;
        while (delta < -Math.PI) delta += twoPi;
        return delta;
      }

      function boardXYFromClient(clientX, clientY) {
        var br = board.getBoundingClientRect();
        var z = boardZoom > 0 ? boardZoom : 1;
        var vx = clientX - br.left;
        var vy = clientY - br.top;
        var ox = zoomFocalOx;
        var oy = zoomFocalOy;
        return { fx: ox + (vx - ox) / z, fy: oy + (vy - oy) / z };
      }

      function angleTowardPivot(px, py, vx, vy) {
        var dx = px - vx;
        var dy = py - vy;
        var len = Math.hypot(dx, dy);
        if (len < MIN_R) {
          if (len < 1e-6) {
            dx = MIN_R;
            dy = 0;
          } else {
            dx = (dx / len) * MIN_R;
            dy = (dy / len) * MIN_R;
          }
        }
        return Math.atan2(dy, dx);
      }

      function boardAabb() {
        var w = rulerSize().w;
        var h = rulerSize().h;
        var knobs = hitRotate.offsetWidth || 54;
        var k = knobs * 0.35;

        /** @type {Array<[number, number]>} */
        var locals = [
          [0, 0],
          [w, 0],
          [w, h],
          [0, h],
          [k, h + k * 0.12],
          [w - k, h + k * 0.12],
          [k * 0.85, h - k * 1.05],
          [w - k * 0.85, h - k * 1.05],
        ];

        var minX = Infinity;
        var minY = Infinity;
        var maxX = -Infinity;
        var maxY = -Infinity;
        var i;
        var rcx = bx + w * 0.5;
        var rcy = by - h * 0.5;
        for (i = 0; i < locals.length; i++) {
          var lx = locals[i][0];
          var ly = locals[i][1];
          var v = rotCwVec(lx - w * 0.5, ly - h * 0.5, thetaDeg);
          var px = rcx + v[0];
          var py = rcy + v[1];
          if (px < minX) minX = px;
          if (py < minY) minY = py;
          if (px > maxX) maxX = px;
          if (py > maxY) maxY = py;
        }
        return { minX: minX, minY: minY, maxX: maxX, maxY: maxY };
      }

      function refreshZoomFocalAroundRuler() {
        var bw = board.clientWidth;
        var bh = board.clientHeight;
        zoomFocalOx = bw * 0.5;
        zoomFocalOy = bh * 0.5;
        if (boardZoomLayer) {
          boardZoomLayer.style.setProperty("--zoom-origin-x", zoomFocalOx + "px");
          boardZoomLayer.style.setProperty("--zoom-origin-y", zoomFocalOy + "px");
        }
      }

      function applyPencilLayout() {
        pencilOuter.style.setProperty("--pencil-x", pencilPx + "px");
        pencilOuter.style.setProperty("--pencil-y", pencilPy + "px");
      }

      function applyCreditLayout() {
        creditCardOuter.style.setProperty("--creditcard-x", creditPx + "px");
        creditCardOuter.style.setProperty("--creditcard-y", creditPy + "px");
      }

      function applyCucumbersLayout() {
        cucumbersOuter.style.setProperty("--cucumbers-x", cucumbersPx + "px");
        cucumbersOuter.style.setProperty("--cucumbers-y", cucumbersPy + "px");
      }

      function applyLayout() {
        var h = rulerSize().h;
        rulerOuter.style.setProperty("--otl-x", bx + "px");
        rulerOuter.style.setProperty("--otl-y", by - h + "px");
        rulerOuter.style.setProperty("--ruler-angle", thetaDeg + "deg");
      }

      function placeCenteredLandscape() {
        var w = rulerSize().w;
        var h = rulerSize().h;
        var cw = Math.max(0, board.clientWidth - 2 * PAD);
        var ch = Math.max(0, board.clientHeight - 2 * PAD);
        var cx = PAD + cw / 2;
        var cy = PAD + ch / 2;

        bx = cx - w / 2;
        by = cy + h / 2;
        thetaDeg = 0;

        applyLayout();
      }

      function placePencilInitial() {
        var cw = Math.max(0, board.clientWidth - 2 * PAD);
        var ch = Math.max(0, board.clientHeight - 2 * PAD);
        pencilPx = PAD + cw * 0.58;
        pencilPy = PAD + ch * 0.18;
        applyPencilLayout();
      }

      function placeCreditInitial() {
        var cw = Math.max(0, board.clientWidth - 2 * PAD);
        var ch = Math.max(0, board.clientHeight - 2 * PAD);
        creditPx = PAD + cw * 0.1;
        creditPy = PAD + ch * 0.32;
        applyCreditLayout();
      }

      function placeCucumbersInitial() {
        var cw = Math.max(0, board.clientWidth - 2 * PAD);
        var ch = Math.max(0, board.clientHeight - 2 * PAD);
        cucumbersPx = PAD + cw * 0.04;
        cucumbersPy = PAD + ch * 0.52;
        applyCucumbersLayout();
      }

      function accumulateRotationAroundCenter(finger) {
        var w = rulerSize().w;
        var h = rulerSize().h;
        var rcx = bx + w * 0.5;
        var rcy = by - h * 0.5;
        var now = angleTowardPivot(finger.fx, finger.fy, rcx, rcy);
        if (lastAngleAgainstPivotRad == null) {
          lastAngleAgainstPivotRad = now;
          return;
        }
        var d = unwrapDeltaRad(now - lastAngleAgainstPivotRad);
        thetaDeg += (d * 180) / Math.PI;
        lastAngleAgainstPivotRad = now;
      }

      function accumulateMoveFinger(finger) {
        if (!moveBase) return;
        bx = moveBase.bx + (finger.fx - moveBase.fx);
        by = moveBase.by + (finger.fy - moveBase.fy);
      }

      function accumulatePencilMoveFinger(finger) {
        if (!pencilDragBase) return;
        pencilPx = pencilDragBase.px + (finger.fx - pencilDragBase.fx);
        pencilPy = pencilDragBase.py + (finger.fy - pencilDragBase.fy);
      }

      function accumulateCreditMoveFinger(finger) {
        if (!creditDragBase) return;
        creditPx = creditDragBase.px + (finger.fx - creditDragBase.fx);
        creditPy = creditDragBase.py + (finger.fy - creditDragBase.fy);
      }

      function accumulateCucumbersMoveFinger(finger) {
        if (!cucumbersDragBase) return;
        cucumbersPx = cucumbersDragBase.px + (finger.fx - cucumbersDragBase.fx);
        cucumbersPy = cucumbersDragBase.py + (finger.fy - cucumbersDragBase.fy);
      }

      function safeReleasePointerCapture(el, pointerIdValue) {
        try {
          el.releasePointerCapture(pointerIdValue);
        } catch (_e) {
          // Ignorovat, pokud aktivní záchyt tohoto pointeru už neexistuje nebo byl uvolněn.
        }
      }

      /** @returns {HTMLElement|null} */
      function gestureCaptureElement() {
        if (mode === "rotate") return rotateGripEl;
        if (mode === "move") return rulerOuter;
        if (mode === "pencil-move") return pencilOuter;
        if (mode === "creditcard-move") return creditCardOuter;
        if (mode === "cucumbers-move") return cucumbersOuter;
        if (mode === "board-pan") return boardPanCatch;
        return null;
      }

      /** @param {PointerEvent} e */
      function resetGesture(/* e */) {
        shell.classList.remove("is-dragging-move", "is-dragging-corner");
        pencilShell.classList.remove("is-dragging-pencil");
        creditCardShell.classList.remove("is-dragging-creditcard");
        cucumbersShell.classList.remove("is-dragging-cucumbers");
        boardPanCatch.classList.remove("is-dragging-pan");
        activePointerId = null;
        mode = "idle";
        moveBase = null;
        pencilDragBase = null;
        creditDragBase = null;
        cucumbersDragBase = null;
        boardPanDragBase = null;
        rotateGripEl = null;
        lastAngleAgainstPivotRad = null;
        applyLayout();
        applyPencilLayout();
        applyCreditLayout();
        applyCucumbersLayout();
      }

      /** @param {PointerEvent} e */
      function onPointerDown(ev) {
        if (mode !== "idle") return;
        if (ev.button != null && ev.button !== 0) return;

        var finger = boardXYFromClient(ev.clientX, ev.clientY);
        /** @type {Node | null} */
        var tgt = /** @type {Node | null} */ (ev.target);

        if (hitRotate.contains(tgt)) {
          mode = "rotate";
          rotateGripEl = hitRotate;
          activePointerId = ev.pointerId;
          shell.classList.add("is-dragging-corner");
          lastAngleAgainstPivotRad = null;
          accumulateRotationAroundCenter(finger);
          hitRotate.setPointerCapture(ev.pointerId);
          ev.preventDefault();
          focusNoScroll(hitRotate);
          return;
        }

        if (rulerOuter === tgt || img === tgt || (tgt != null && rulerOuter.contains(tgt))) {
          mode = "move";
          activePointerId = ev.pointerId;
          shell.classList.add("is-dragging-move");
          moveBase = { bx: bx, by: by, fx: finger.fx, fy: finger.fy };
          rulerOuter.setPointerCapture(ev.pointerId);
          ev.preventDefault();
          return;
        }

        if (
          creditCardOuter === tgt ||
          creditCardImg === tgt ||
          (tgt != null && creditCardOuter.contains(tgt))
        ) {
          mode = "creditcard-move";
          activePointerId = ev.pointerId;
          creditDragBase = { px: creditPx, py: creditPy, fx: finger.fx, fy: finger.fy };
          creditCardShell.classList.add("is-dragging-creditcard");
          creditCardOuter.setPointerCapture(ev.pointerId);
          ev.preventDefault();
          focusNoScroll(creditCardShell);
          return;
        }

        if (
          pencilOuter === tgt ||
          pencilImg === tgt ||
          (tgt != null && pencilOuter.contains(tgt))
        ) {
          mode = "pencil-move";
          activePointerId = ev.pointerId;
          pencilDragBase = { px: pencilPx, py: pencilPy, fx: finger.fx, fy: finger.fy };
          pencilShell.classList.add("is-dragging-pencil");
          pencilOuter.setPointerCapture(ev.pointerId);
          ev.preventDefault();
          focusNoScroll(pencilShell);
          return;
        }

        if (
          cucumbersOuter === tgt ||
          cucumbersImg === tgt ||
          (tgt != null && cucumbersOuter.contains(tgt))
        ) {
          mode = "cucumbers-move";
          activePointerId = ev.pointerId;
          cucumbersDragBase = { px: cucumbersPx, py: cucumbersPy, fx: finger.fx, fy: finger.fy };
          cucumbersShell.classList.add("is-dragging-cucumbers");
          cucumbersOuter.setPointerCapture(ev.pointerId);
          ev.preventDefault();
          focusNoScroll(cucumbersShell);
          return;
        }
      }

      /** @param {PointerEvent} e */
      function onPointerMove(ev) {
        if (mode === "idle" || activePointerId == null || ev.pointerId !== activePointerId) return;

        if (mode === "board-pan") {
          if (!boardPanDragBase) return;
          boardPanX = boardPanDragBase.ox + (ev.clientX - boardPanDragBase.cx);
          boardPanY = boardPanDragBase.oy + (ev.clientY - boardPanDragBase.cy);
          applyBoardZoomCss();
          ev.preventDefault();
          return;
        }

        var finger = boardXYFromClient(ev.clientX, ev.clientY);
        if (mode === "move") accumulateMoveFinger(finger);
        if (mode === "rotate") accumulateRotationAroundCenter(finger);
        if (mode === "pencil-move") accumulatePencilMoveFinger(finger);
        if (mode === "creditcard-move") accumulateCreditMoveFinger(finger);
        if (mode === "cucumbers-move") accumulateCucumbersMoveFinger(finger);

        applyLayout();
        applyPencilLayout();
        applyCreditLayout();
        applyCucumbersLayout();
        ev.preventDefault();
      }

      /** @param {PointerEvent} e */
      function onPointerEnd(ev) {
        if (activePointerId == null || ev.pointerId !== activePointerId) return;

        var captured = gestureCaptureElement();
        if (captured) safeReleasePointerCapture(captured, ev.pointerId);

        resetGesture(ev);
      }

      [hitRotate, rulerOuter, pencilOuter, creditCardOuter, cucumbersOuter, boardPanCatch].forEach(function (element) {
        element.addEventListener(
          "lostpointercapture",
          function (lostEv) {
            if (lostEv.pointerId !== activePointerId) return;
            resetGesture(lostEv);
          },
          { passive: true }
        );
      });

      /** @param {PointerEvent} ev */
      function onBoardPanPointerDown(ev) {
        if (mode !== "idle") return;
        if (ev.button != null && ev.button !== 0) return;
        mode = "board-pan";
        activePointerId = ev.pointerId;
        boardPanDragBase = { ox: boardPanX, oy: boardPanY, cx: ev.clientX, cy: ev.clientY };
        boardPanCatch.classList.add("is-dragging-pan");
        boardPanCatch.setPointerCapture(ev.pointerId);
        ev.preventDefault();
      }

      boardPanCatch.addEventListener("pointerdown", onBoardPanPointerDown, { passive: false });

      board.addEventListener("pointerdown", onPointerDown, { passive: false });
      board.addEventListener("pointermove", onPointerMove, { passive: false });
      board.addEventListener("pointerup", onPointerEnd, { passive: false });
      board.addEventListener("pointercancel", onPointerEnd, { passive: false });

      window.addEventListener("resize", function () {
        applyLayout();
        applyPencilLayout();
        applyCreditLayout();
        applyCucumbersLayout();
        refreshZoomFocalAroundRuler();
      });

      window.addEventListener("load", function () {
        requestAnimationFrame(function () {
          placeCenteredLandscape();
          placePencilInitial();
          placeCreditInitial();
          placeCucumbersInitial();
          refreshZoomFocalAroundRuler();
          applyBoardZoomCss();
        });
      });

      shell.addEventListener("keydown", function (e) {
        var stepPx = e.shiftKey ? 10 : 3;
        var stepDeg = e.shiftKey ? 3 : 1;

        if (e.altKey && (e.key === "ArrowLeft" || e.key === "ArrowRight")) {
          e.preventDefault();
          var dirAlt = e.key === "ArrowLeft" ? -1 : 1;
          thetaDeg += dirAlt * stepDeg;
          applyLayout();
          applyPencilLayout();
          applyCreditLayout();
          applyCucumbersLayout();
          return;
        }

        if (
          e.key !== "ArrowLeft" &&
          e.key !== "ArrowRight" &&
          e.key !== "ArrowUp" &&
          e.key !== "ArrowDown"
        )
          return;
        if (e.altKey) return;

        e.preventDefault();

        if (e.key === "ArrowLeft") bx -= stepPx;
        if (e.key === "ArrowRight") bx += stepPx;
        if (e.key === "ArrowUp") by -= stepPx;
        if (e.key === "ArrowDown") by += stepPx;

        applyLayout();
        applyPencilLayout();
        applyCreditLayout();
        applyCucumbersLayout();
      });

      pencilShell.addEventListener("keydown", function (e) {
        var stepPx = e.shiftKey ? 10 : 3;

        if (
          e.key !== "ArrowLeft" &&
          e.key !== "ArrowRight" &&
          e.key !== "ArrowUp" &&
          e.key !== "ArrowDown"
        )
          return;
        if (e.altKey) return;

        e.preventDefault();

        if (e.key === "ArrowLeft") pencilPx -= stepPx;
        if (e.key === "ArrowRight") pencilPx += stepPx;
        if (e.key === "ArrowUp") pencilPy -= stepPx;
        if (e.key === "ArrowDown") pencilPy += stepPx;

        applyPencilLayout();
      });

      creditCardShell.addEventListener("keydown", function (e) {
        var stepPx = e.shiftKey ? 10 : 3;

        if (
          e.key !== "ArrowLeft" &&
          e.key !== "ArrowRight" &&
          e.key !== "ArrowUp" &&
          e.key !== "ArrowDown"
        )
          return;
        if (e.altKey) return;

        e.preventDefault();

        if (e.key === "ArrowLeft") creditPx -= stepPx;
        if (e.key === "ArrowRight") creditPx += stepPx;
        if (e.key === "ArrowUp") creditPy -= stepPx;
        if (e.key === "ArrowDown") creditPy += stepPx;

        applyCreditLayout();
      });

      cucumbersShell.addEventListener("keydown", function (e) {
        var stepPx = e.shiftKey ? 10 : 3;

        if (
          e.key !== "ArrowLeft" &&
          e.key !== "ArrowRight" &&
          e.key !== "ArrowUp" &&
          e.key !== "ArrowDown"
        )
          return;
        if (e.altKey) return;

        e.preventDefault();

        if (e.key === "ArrowLeft") cucumbersPx -= stepPx;
        if (e.key === "ArrowRight") cucumbersPx += stepPx;
        if (e.key === "ArrowUp") cucumbersPy -= stepPx;
        if (e.key === "ArrowDown") cucumbersPy += stepPx;

        applyCucumbersLayout();
      });
    })();
  </script>
</body>
</html>
